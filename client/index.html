<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/GeniBlog.svg" />


  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeniBlog</title>
</head>
<div id="root">
  <style>
    .initial-splash-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background-color: #ffffff;
      /* Clean white screen */
    }

    .splash-content {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle, #f3f4f6 10%, #ffffff 80%);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.9);
        opacity: 0.5;
      }

      50% {
        transform: scale(1.1);
        opacity: 1;
      }

      100% {
        transform: scale(0.9);
        opacity: 0.5;
      }
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
  <div class="initial-splash-screen">
    <div class="splash-content"></div>
  </div>
</div>
<script type="module" src="/src/main.jsx"></script>
</body>

</html>
